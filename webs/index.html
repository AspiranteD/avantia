<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Avantia · Webs de demostración</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1a1410; --panel:#241c15; --line:#38291d;
    --crema:#f6efe4; --muted:#b6a890; --coral:#FF5B4A; --lima:#B6E61E;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'DM Sans',system-ui,sans-serif;
    background:radial-gradient(circle at 80% -10%,rgba(255,91,74,.15),transparent 45%),var(--bg);
    color:var(--crema); min-height:100vh; padding:48px 22px 80px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--coral);
    font-weight:700;margin-bottom:14px;
  }
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(30px,6vw,52px);
    line-height:1.02;letter-spacing:-.02em;margin-bottom:14px;max-width:18ch}
  .sub{color:var(--muted);font-size:16px;line-height:1.6;max-width:54ch;margin-bottom:40px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
  .card{
    display:block;background:var(--panel);border:1px solid var(--line);border-radius:18px;
    padding:24px;color:inherit;text-decoration:none;
    transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;
  }
  .card:hover{transform:translateY(-4px);border-color:var(--coral);
    box-shadow:0 18px 40px -22px rgba(255,91,74,.6)}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
  .name{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.01em}
  .badge{font-size:11px;font-weight:700;background:var(--lima);color:#1a1410;
    padding:4px 11px;border-radius:999px;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
  .meta{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:18px}
  .meta .star{color:#ffc24c}
  .open{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:15px;
    color:var(--crema);background:var(--coral);padding:11px 18px;border-radius:999px;width:100%;justify-content:center}
  .foot{margin-top:54px;color:var(--muted);font-size:13px;text-align:center;opacity:.8}
  .foot a{color:var(--coral);text-decoration:none}
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Avantia · Demostraciones</div>
    <h1>Webs de muestra para negocios de Valencia</h1>
    <p class="sub">Ejemplos reales generados a partir de datos públicos de Google Maps. Cada landing es única, personalizada con las reseñas y el estilo del negocio. Haz clic para abrir.</p>

    <div class="grid" id="grid"></div>

    <div class="foot">© 2026 Avantia · <a href="/avantia/">volver a la web principal</a></div>
  </div>

  <script>
    const clients = [
      { slug:"ritualpet-estilismo-canino", name:"Ritual Pet", rating:"5.0", reviews:"95", location:"Camins al Grau, Valencia" },
      { slug:"tu-pet", name:"Tu Pet", rating:"4.8", reviews:"124", location:"Quatre Carreres, Valencia" }
    ];
    const grid = document.getElementById("grid");
    clients.forEach(c => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = `/avantia/clientes/${c.slug}/`;
      a.innerHTML = `
        <div class="row">
          <span class="name">${c.name}</span>
          <span class="badge">En línea</span>
        </div>
        <div class="meta"><span class="star">★</span> ${c.rating} · ${c.reviews} reseñas<br>📍 ${c.location}</div>
        <span class="open">Ver landing →</span>`;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
