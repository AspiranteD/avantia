<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Sampler de estilos · Ritualpet Estilismo Canino</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:#14110d;color:#f6efe4;padding:46px 22px 80px}
  .wrap{max-width:1080px;margin:0 auto}
  .eyebrow{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#FF5B4A;font-weight:700;margin-bottom:12px}
  h1{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(28px,5vw,46px);margin-bottom:10px}
  .sub{color:#b6a890;margin-bottom:36px;max-width:60ch;line-height:1.6}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
  .card{display:block;background:#241c15;border:1px solid #38291d;border-radius:18px;padding:24px;color:inherit;text-decoration:none;transition:transform .15s,border-color .15s}
  .card:hover{transform:translateY(-4px);border-color:#FF5B4A}
  .num{font-family:'Bricolage Grotesque';font-weight:800;font-size:13px;color:#FF5B4A;letter-spacing:.1em}
  .name{font-family:'Bricolage Grotesque';font-weight:800;font-size:22px;margin:6px 0 6px}
  .mood{color:#b6a890;font-size:14px;margin-bottom:16px}
  .open{display:inline-block;background:#FF5B4A;color:#fff;font-weight:700;font-size:14px;padding:10px 16px;border-radius:999px;width:100%;text-align:center}
</style></head><body>
<div class="wrap">
  <div class="eyebrow">Sampler de estilos · elige tu favorito</div>
  <h1>Ritualpet Estilismo Canino en 5 estilos</h1>
  <p class="sub">El mismo negocio, mismas fotos y reseñas reales, renderizado en 5 sistemas de diseño distintos. Ábrelos y dime cuál te gusta (o si quieres mezclar varios entre las 20 peluquerías).</p>
  <div class="grid" id="grid"></div>
</div>
<script>
  const styles = [
    { id:"01-elegancia-serena", nombre:"Elegancia Serena", mood:"Refinado, sereno, boutique", folder:"ritualpet-estilismo-canino__01-elegancia-serena" }
    { id:"02-energia-playful", nombre:"Energía Playful", mood:"Vibrante, divertido, con rebote", folder:"ritualpet-estilismo-canino__02-energia-playful" }
    { id:"03-confianza-cercana", nombre:"Confianza Cercana", mood:"Confiable, cercano, profesional", folder:"ritualpet-estilismo-canino__03-confianza-cercana" }
    { id:"04-honestidad-bold", nombre:"Honestidad Bold", mood:"Honesto, crudo, enérgico", folder:"ritualpet-estilismo-canino__04-honestidad-bold" }
    { id:"05-organico-natural", nombre:"Orgánico Natural", mood:"Natural, sano, terroso", folder:"ritualpet-estilismo-canino__05-organico-natural" }
  ];
  const grid = document.getElementById("grid");
  styles.forEach((s,i) => {
    const a = document.createElement("a");
    a.className = "card"; a.href = `./${s.folder}/`;
    a.innerHTML = `<div class="num">${s.id.split('-')[0]}</div>
      <div class="name">${s.nombre}</div>
      <div class="mood">${s.mood}</div>
      <span class="open">Ver este estilo →</span>`;
    grid.appendChild(a);
  });
</script>
</body></html>
